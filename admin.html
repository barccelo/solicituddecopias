<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel administrativo · Solicitudes</title>
  <style>
    :root{--red:#8b0000;--bg:#f3f4f6;--card:#fff;--border:#d8dce2;--text:#202124;--muted:#68707a}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
    header{background:var(--red);color:#fff;text-align:center;padding:18px 14px}
    header h1{margin:0;font-size:22px}
    main{max-width:1120px;margin:0 auto;padding:14px}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
    .hidden{display:none!important}
    .grid-2{display:grid;grid-template-columns:1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:1fr;gap:12px}
    label{display:block;font-weight:700;font-size:14px;margin-bottom:6px}
    input,select,textarea{width:100%;min-height:44px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:#fff}
    textarea{min-height:82px;resize:vertical}
    button{border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:700;padding:10px 13px;cursor:pointer}
    button.secondary{background:#4b5563}
    button.light{background:#eceef1;color:#202124}
    button:disabled{opacity:.65;cursor:wait}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tabs{display:flex;gap:8px;overflow:auto;margin-bottom:14px}
    .tab{background:#fff;color:#202124;border:1px solid var(--border)}
    .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
    table{border-collapse:collapse;width:100%;min-width:760px}
    th,td{border-bottom:1px solid var(--border);padding:9px;text-align:left;font-size:14px;vertical-align:top}
    th{background:#f7f8fa}
    .table-wrap{overflow:auto}
    .message{display:none;padding:11px;border-radius:10px;margin-top:12px}
    .message.ok{display:block;background:#e7f5ed;color:#166534}
    .message.err{display:block;background:#fdecef;color:#991b1b}
    .muted{color:var(--muted);font-size:13px}
    @media(min-width:760px){.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<header>
  <h1>Panel administrativo</h1>
</header>

<main>
  <section id="loginCard" class="card">
    <h2>Acceso</h2>
    <div class="grid-2">
      <div>
        <label>ID</label>
        <input id="loginId" inputmode="numeric">
      </div>
      <div>
        <label>PIN</label>
        <input id="loginPin" type="password" inputmode="numeric" maxlength="6">
      </div>
    </div>
    <button id="loginButton" style="margin-top:12px" onclick="login()">Ingresar</button>
    <div id="loginMessage" class="message"></div>
  </section>

  <section id="panel" class="hidden">
    <div class="toolbar">
      <button onclick="loadData()">Actualizar</button>
      <button class="secondary" onclick="clearCache()">Limpiar caché</button>
      <button class="light" onclick="rehashPins()">Rehacer hashes PIN</button>
      <button class="light" onclick="logout()">Salir</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="users" onclick="showTab('users')">Usuarios</button>
      <button class="tab" data-tab="permissions" onclick="showTab('permissions')">Permisos</button>
      <button class="tab" data-tab="catalogs" onclick="showTab('catalogs')">Catálogos</button>
      <button class="tab" data-tab="reports" onclick="showTab('reports')">Reportes</button>
    </div>

    <section id="tab-users" class="card">
      <h2>Usuarios</h2>
      <div class="grid-3">
        <div><label>ID</label><input id="uId" placeholder="Vacío = próximo ID"></div>
        <div><label>Nombre</label><input id="uName"></div>
        <div><label>Cargo / Rol</label><input id="uRole"></div>
        <div><label>Observaciones</label><input id="uObs"></div>
        <label><input id="uActive" type="checkbox" checked style="width:auto;min-height:auto"> Activo</label>
        <label><input id="uAcademic" type="checkbox" style="width:auto;min-height:auto"> Usa campos académicos</label>
        <label><input id="uAdmin" type="checkbox" style="width:auto;min-height:auto"> Es administrador</label>
      </div>
      <div class="toolbar" style="margin-top:12px">
        <button class="secondary" onclick="newUser()">Nuevo usuario</button>
        <button onclick="saveUser()">Guardar usuario</button>
        <button class="light" onclick="setPin()">Cambiar PIN</button>
        <button class="light" onclick="unlockUser()">Desbloquear</button>
      </div>
      <div id="userMessage" class="message"></div>
      <div class="table-wrap" style="margin-top:14px">
        <table>
          <thead><tr><th>ID</th><th>Nombre</th><th>Cargo</th><th>Activo</th><th>Admin</th><th>PIN</th><th></th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-permissions" class="card hidden">
      <h2>Permisos</h2>
      <div class="grid-3">
        <div><label>ID</label><input id="pId"></div>
        <div><label>Nombre</label><input id="pName"></div>
        <div><label>Ámbito</label><select id="pAmbito"></select></div>
        <div><label>Grado / Año</label><input id="pGrado" placeholder="Opcional"></div>
        <div><label>Sección</label><input id="pSeccion" placeholder="Opcional"></div>
        <div><label>Materia</label><input id="pMateria" placeholder="Opcional"></div>
        <div><label>Objeto / Destino</label><input id="pObjeto" placeholder="Opcional"></div>
        <div><label>Disciplina deportiva</label><input id="pDisciplina" placeholder="Opcional"></div>
        <div><label>Origen</label><input id="pOrigen" value="Manual"></div>
        <label><input id="pActive" type="checkbox" checked style="width:auto;min-height:auto"> Activo</label>
      </div>
      <button style="margin-top:12px" onclick="savePermission()">Agregar permiso</button>
      <div id="permissionMessage" class="message"></div>
      <div class="table-wrap" style="margin-top:14px">
        <table>
          <thead><tr><th>ID</th><th>Nombre</th><th>Ámbito</th><th>Grado</th><th>Sección</th><th>Materia</th><th>Objeto</th><th>Disciplina</th><th>Activo</th></tr></thead>
          <tbody id="permissionsTable"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-catalogs" class="card hidden">
      <h2>Catálogos</h2>
      <h3>Objeto / Destino</h3>
      <div class="grid-3">
        <div><label>Ámbito</label><select id="oAmbito"></select></div>
        <div><label>Objeto / Destino</label><input id="oObjeto"></div>
        <label><input id="oGrade" type="checkbox" style="width:auto;min-height:auto"> Usa grado</label>
        <label><input id="oSection" type="checkbox" style="width:auto;min-height:auto"> Usa sección</label>
        <label><input id="oSubject" type="checkbox" style="width:auto;min-height:auto"> Usa materia</label>
        <label><input id="oReport" type="checkbox" checked style="width:auto;min-height:auto"> Sale en reporte</label>
        <label><input id="oActive" type="checkbox" checked style="width:auto;min-height:auto"> Activo</label>
      </div>
      <button style="margin-top:12px" onclick="saveObject()">Guardar objeto</button>

      <h3>Disciplina deportiva</h3>
      <div class="grid-2">
        <div><label>Disciplina</label><input id="dName"></div>
        <label><input id="dActive" type="checkbox" checked style="width:auto;min-height:auto"> Activa</label>
      </div>
      <button style="margin-top:12px" onclick="saveDiscipline()">Guardar disciplina</button>
      <div id="catalogMessage" class="message"></div>
    </section>

    <section id="tab-reports" class="card hidden">
      <h2>Reportes por fecha</h2>
      <div class="grid-3">
        <div><label>Ámbito</label><select id="rAmbito"></select></div>
        <div><label>Desde</label><input id="rDesde" type="date"></div>
        <div><label>Hasta</label><input id="rHasta" type="date"></div>
      </div>
      <div class="toolbar" style="margin-top:12px">
        <button onclick="generateReport()">Generar en Google Sheets</button>
        <button class="secondary" onclick="downloadCsv()">Descargar CSV último reporte</button>
      </div>
      <div id="reportMessage" class="message"></div>
    </section>
  </section>
</main>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw41nIIwyDbFgCOL-0-3HflQXGRFjCyVmUXDOWN3O-o-yCm724Aa1zyq3xaXtd21sg/exec';
let token='';
let adminData=null;
let lastCsv='';
let lastCsvName='reporte.csv';

function callApi(action,params={}){
  return new Promise((resolve,reject)=>{
    const callback='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const query=new URLSearchParams({...params,action,callback}).toString();
    const script=document.createElement('script');
    window[callback]=response=>{
      delete window[callback];
      script.remove();
      resolve(response);
    };
    script.onerror=()=>{
      delete window[callback];
      script.remove();
      reject(new Error('No se pudo conectar con la base de datos.'));
    };
    script.src=SCRIPT_URL+'?'+query;
    document.body.appendChild(script);
  });
}

function msg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='message '+type;
}

function fillSelect(id, values){
  const select=document.getElementById(id);
  select.innerHTML='<option value="">Seleccione</option>';
  [...new Set((values||[]).filter(Boolean))].forEach(value=>{
    const option=document.createElement('option');
    option.value=value;
    option.textContent=value;
    select.appendChild(option);
  });
}

async function login(){
  const id=document.getElementById('loginId').value.trim();
  const pin=document.getElementById('loginPin').value.trim();

  const response=await callApi('login',{id,pin});

  if(!response.success){
    msg('loginMessage',response.message,'err');
    return;
  }

  if(!response.user.esAdministrador){
    msg('loginMessage','Este usuario no es administrador.','err');
    return;
  }

  token=response.token;
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');
  await loadData();
}

async function loadData(){
  const response=await callApi('adminGetData',{token});

  if(!response.success){
    alert(response.message);
    return;
  }

  adminData=response;
  const ambitos=(response.ambitos||[]).map(item=>item['Ámbito']);

  ['pAmbito','oAmbito','rAmbito'].forEach(id=>fillSelect(id,ambitos));
  renderUsers();
  renderPermissions();
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===name));
  ['users','permissions','catalogs','reports'].forEach(tab=>{
    document.getElementById('tab-'+tab).classList.toggle('hidden',tab!==name);
  });
}

function renderUsers(){
  const body=document.getElementById('usersTable');
  body.innerHTML='';
  (adminData.usuarios||[]).forEach(user=>{
    const row=document.createElement('tr');
    row.innerHTML=`
      <td>${escapeHtml(user.ID)}</td>
      <td>${escapeHtml(user.Nombre)}</td>
      <td>${escapeHtml(user['Cargo / Rol'])}</td>
      <td>${escapeHtml(user.Activo)}</td>
      <td>${escapeHtml(user['Es administrador'])}</td>
      <td>${user['PIN Hash']?'Sí':'No'}</td>
      <td><button class="light" onclick="editUser('${escapeAttr(user.ID)}')">Editar</button></td>
    `;
    body.appendChild(row);
  });
}


function newUser(){
  document.getElementById('uId').value=adminData.nextUserId||'';
  document.getElementById('uName').value='';
  document.getElementById('uRole').value='';
  document.getElementById('uObs').value='';
  document.getElementById('uActive').checked=true;
  document.getElementById('uAcademic').checked=false;
  document.getElementById('uAdmin').checked=false;
  document.getElementById('pId').value=adminData.nextUserId||'';
  document.getElementById('pName').value='';
}

function editUser(id){
  const user=(adminData.usuarios||[]).find(item=>String(item.ID)===String(id));
  if(!user)return;
  document.getElementById('uId').value=user.ID||'';
  document.getElementById('uName').value=user.Nombre||'';
  document.getElementById('uRole').value=user['Cargo / Rol']||'';
  document.getElementById('uObs').value=user.Observaciones||'';
  document.getElementById('uActive').checked=yes(user.Activo);
  document.getElementById('uAcademic').checked=yes(user['Usa campos académicos']);
  document.getElementById('uAdmin').checked=yes(user['Es administrador']);
  document.getElementById('pId').value=user.ID||'';
  document.getElementById('pName').value=user.Nombre||'';
}

async function saveUser(){
  const response=await callApi('adminSaveUser',{
    token,
    id:document.getElementById('uId').value,
    nombre:document.getElementById('uName').value,
    rol:document.getElementById('uRole').value,
    observaciones:document.getElementById('uObs').value,
    activo:document.getElementById('uActive').checked,
    usaCamposAcademicos:document.getElementById('uAcademic').checked,
    esAdministrador:document.getElementById('uAdmin').checked
  });
  msg('userMessage',response.message,response.success?'ok':'err');
  if(response.success){
    if(response.id){
      document.getElementById('uId').value=response.id;
      document.getElementById('pId').value=response.id;
      document.getElementById('pName').value=document.getElementById('uName').value;
    }
    await loadData();
  }
}

async function setPin(){
  const id=document.getElementById('uId').value.trim();
  if(!id){
    msg('userMessage','Primero guarde o seleccione un usuario para tener ID.','err');
    return;
  }
  const pin=prompt('Nuevo PIN de 6 dígitos para '+id+':');
  if(pin===null)return;
  const response=await callApi('adminSetPin',{token,id,pin});
  msg('userMessage',response.message,response.success?'ok':'err');
  if(response.success)await loadData();
}

async function unlockUser(){
  const id=document.getElementById('uId').value.trim();
  const response=await callApi('adminUnlockUser',{token,id});
  msg('userMessage',response.message,response.success?'ok':'err');
}

function renderPermissions(){
  const body=document.getElementById('permissionsTable');
  body.innerHTML='';
  (adminData.permisos||[]).slice(-250).reverse().forEach(p=>{
    const row=document.createElement('tr');
    row.innerHTML=`
      <td>${escapeHtml(p.ID)}</td>
      <td>${escapeHtml(p.Nombre)}</td>
      <td>${escapeHtml(p['Ámbito'])}</td>
      <td>${escapeHtml(p['Grado / Año'])}</td>
      <td>${escapeHtml(p['Sección'])}</td>
      <td>${escapeHtml(p.Materia)}</td>
      <td>${escapeHtml(p['Objeto / Destino'])}</td>
      <td>${escapeHtml(p['Disciplina deportiva'])}</td>
      <td>${escapeHtml(p.Activo)}</td>
    `;
    body.appendChild(row);
  });
}

async function savePermission(){
  const response=await callApi('adminSavePermission',{
    token,
    id:document.getElementById('pId').value,
    nombre:document.getElementById('pName').value,
    ambito:document.getElementById('pAmbito').value,
    grado:document.getElementById('pGrado').value,
    seccion:document.getElementById('pSeccion').value,
    materia:document.getElementById('pMateria').value,
    objeto:document.getElementById('pObjeto').value,
    disciplina:document.getElementById('pDisciplina').value,
    origen:document.getElementById('pOrigen').value,
    activo:document.getElementById('pActive').checked
  });
  msg('permissionMessage',response.message,response.success?'ok':'err');
  if(response.success)await loadData();
}

async function saveObject(){
  const response=await callApi('adminSaveObject',{
    token,
    ambito:document.getElementById('oAmbito').value,
    objeto:document.getElementById('oObjeto').value,
    usaGrado:document.getElementById('oGrade').checked,
    usaSeccion:document.getElementById('oSection').checked,
    usaMateria:document.getElementById('oSubject').checked,
    esReporte:document.getElementById('oReport').checked,
    activo:document.getElementById('oActive').checked
  });
  msg('catalogMessage',response.message,response.success?'ok':'err');
  if(response.success)await loadData();
}

async function saveDiscipline(){
  const response=await callApi('adminSaveDiscipline',{
    token,
    nombre:document.getElementById('dName').value,
    activo:document.getElementById('dActive').checked
  });
  msg('catalogMessage',response.message,response.success?'ok':'err');
  if(response.success)await loadData();
}

async function generateReport(){
  const ambito=document.getElementById('rAmbito').value;
  const desde=document.getElementById('rDesde').value;
  const hasta=document.getElementById('rHasta').value;

  const response=await callApi('adminGenerateReport',{token,ambito,desde,hasta});
  msg('reportMessage',response.message+(response.rows!==undefined?' Filas: '+response.rows:''),response.success?'ok':'err');

  if(response.success){
    lastCsv=response.csv||'';
    lastCsvName='reporte_'+ambito.replace(/[^a-z0-9]/gi,'_')+'_'+desde+'_'+hasta+'.csv';
  }
}

function downloadCsv(){
  if(!lastCsv){
    alert('Primero genera un reporte.');
    return;
  }

  const blob=new Blob([lastCsv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=lastCsvName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}


async function rehashPins(){
  if(!confirm('Esto rehace los PIN Hash usando la pestaña PINsIniciales. Úsalo si los PIN visibles no funcionan después de cambiar de versión/proyecto.'))return;
  const response=await callApi('adminRehashInitialPins',{token});
  alert(response.message||'Proceso terminado.');
  if(response.success)await loadData();
}

async function clearCache(){
  const response=await callApi('adminClearCache',{token});
  alert(response.message);
}

async function logout(){
  if(token)await callApi('logout',{token});
  location.reload();
}

function yes(value){
  return ['sí','si','true','1','yes'].includes(String(value||'').toLowerCase());
}

function escapeHtml(value){
  return String(value||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function escapeAttr(value){
  return escapeHtml(value).replace(/`/g,'');
}
</script>
</body>
</html>
