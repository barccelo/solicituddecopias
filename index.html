<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Solicitud de materiales</title>
  <style>
    :root{--primary:#8b0000;--bg:#f3f4f6;--card:#fff;--text:#202124;--muted:#676b72;--border:#dfe2e7;--success:#176b3a;--error:#a61b2b}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{min-height:100vh;padding-bottom:24px}
    .header{background:var(--primary);color:white;padding:26px 18px 23px;text-align:center;border-radius:0 0 24px 24px}
    .header h1{margin:0;font-size:24px}
    .header p{margin:8px 0 0;font-size:14px;opacity:.94}
    .container{width:100%;max-width:760px;margin:0 auto;padding:16px 12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 5px 18px rgba(0,0,0,.07);margin-bottom:16px}
    .section-title{margin-bottom:17px;color:var(--primary);font-size:19px;font-weight:700}
    .field{margin-bottom:16px}
    label{display:block;margin-bottom:7px;font-size:15px;font-weight:700}
    .optional{font-weight:400;color:var(--muted)}
    input,select,textarea{width:100%;min-height:52px;padding:13px 14px;border:1px solid var(--border);border-radius:12px;background:white;color:var(--text);font:inherit;font-size:16px}
    textarea{min-height:96px;resize:vertical}
    .grid{display:grid;grid-template-columns:1fr;gap:0}
    .button{width:100%;min-height:54px;border:0;border-radius:13px;padding:14px 16px;background:var(--primary);color:white;font-size:16px;font-weight:700;cursor:pointer}
    .button.secondary{margin-top:10px;background:#44474d}
    .button:disabled{background:#9a9a9a;cursor:wait}
    .hidden{display:none!important}
    .message{display:none;margin-top:14px;padding:13px;border-radius:11px;font-size:14px;line-height:1.4}
    .message.success{display:block;background:#e9f6ee;color:var(--success);border:1px solid #b9dfc7}
    .message.error{display:block;background:#fdecef;color:var(--error);border:1px solid #efb7c0}
    .user-box{padding:14px;margin-bottom:17px;background:#f7f8fa;border:1px solid var(--border);border-radius:14px}
    .user-row{padding:8px 0;border-bottom:1px solid #e4e6ea;font-size:14px}
    .user-row:last-child{border-bottom:0}
    .user-row strong{display:block;margin-bottom:3px;color:var(--muted)}
    .total-box{margin-bottom:17px;padding:15px;text-align:center;font-size:17px;font-weight:700;background:#fff6e6;border:1px solid #efd39a;border-radius:13px}
    .total-box span{color:var(--primary);font-size:24px}
    @media(min-width:760px){.header{max-width:760px;margin:18px auto 0;border-radius:18px}.grid{grid-template-columns:1fr 1fr;gap:14px}}
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>Solicitud de materiales</h1>
    <p>Copias y resmas de hojas</p>
  </header>

  <main class="container">
    <section id="loginCard" class="card">
      <div class="section-title">Ingreso</div>
      <div class="field">
        <label for="userId">ID del usuario</label>
        <input id="userId" type="text" inputmode="numeric" placeholder="Ejemplo: 1001">
      </div>
      <button id="loginButton" class="button" type="button" onclick="searchUser()">Ingresar</button>
      <div id="loginMessage" class="message"></div>
    </section>

    <section id="formCard" class="card hidden">
      <div class="section-title">Nueva solicitud</div>

      <div class="user-box">
        <div class="user-row"><strong>ID</strong><span id="displayId"></span></div>
        <div class="user-row"><strong>Nombre</strong><span id="displayName"></span></div>
        <div class="user-row"><strong>Etapa del usuario</strong><span id="displayStage"></span></div>
        <div class="user-row"><strong>Cargo / Rol</strong><span id="displayRole"></span></div>
      </div>

      <form id="requestForm" onsubmit="return false;">
        <div class="field">
          <label for="tipoSolicitud">Tipo de solicitud</label>
          <select id="tipoSolicitud" onchange="updateRequestType()" required></select>
        </div>

        <div class="field">
          <label for="etapaDestino">Etapa de destino</label>
          <select id="etapaDestino" onchange="updateDestinationStage()" required></select>
        </div>

        <div class="field">
          <label for="objetoDestino">Objeto / Destino</label>
          <select id="objetoDestino" required></select>
        </div>

        <div id="copiesSection" class="hidden">
          <div id="academicFields">
            <div class="grid">
              <div class="field">
                <label for="grado">Grado / Año</label>
                <select id="grado" onchange="updateGradeOptions()"></select>
              </div>
              <div class="field">
                <label for="seccion">Sección</label>
                <select id="seccion"></select>
              </div>
            </div>

            <div class="field">
              <label for="materia">Materia</label>
              <select id="materia"></select>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="hojasOriginales">Número de hojas originales</label>
              <input id="hojasOriginales" type="number" min="1" step="1" inputmode="numeric" oninput="updateTotal()">
            </div>
            <div class="field">
              <label for="numeroJuegos">Número de juegos</label>
              <input id="numeroJuegos" type="number" min="1" step="1" inputmode="numeric" oninput="updateTotal()">
            </div>
          </div>

          <div class="total-box">Total de copias: <span id="totalCopias">0</span></div>

          <div class="grid">
            <div class="field">
              <label for="lado">Impresión</label>
              <select id="lado"></select>
            </div>
            <div class="field">
              <label for="corte">Corte <span class="optional">(opcional)</span></label>
              <select id="corte"></select>
            </div>
          </div>

          <div class="field">
            <label for="grapado">Grapado <span class="optional">(opcional)</span></label>
            <select id="grapado"></select>
          </div>
        </div>

        <div id="reamSection" class="hidden">
          <div class="field">
            <label for="cantidadResmas">Cantidad de resmas</label>
            <input id="cantidadResmas" type="number" min="1" step="1" inputmode="numeric">
          </div>
        </div>

        <div class="field">
          <label for="observaciones">Observaciones <span class="optional">(opcional)</span></label>
          <textarea id="observaciones"></textarea>
        </div>

        <div class="field">
          <label for="comentario">Comentario <span class="optional">(opcional)</span></label>
          <textarea id="comentario"></textarea>
        </div>

        <button id="submitButton" class="button" type="button" onclick="submitRequest()">Enviar solicitud</button>
        <button class="button secondary" type="button" onclick="resetApp()">Cambiar de usuario</button>
        <div id="formMessage" class="message"></div>
      </form>
    </section>
  </main>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw41nIIwyDbFgCOL-0-3HflQXGRFjCyVmUXDOWN3O-o-yCm724Aa1zyq3xaXtd21sg/exec';
let currentUser=null;
let catalogs=null;

document.addEventListener('DOMContentLoaded',()=>{
  loadCatalogs();
  document.getElementById('userId').addEventListener('keydown',event=>{
    if(event.key==='Enter'){event.preventDefault();searchUser();}
  });
});

function normalizeStage(value){
  const text=String(value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'').toLowerCase();
  if(text.includes('ebp'))return'ebp';
  if(text.includes('emg'))return'emg';
  if(text.includes('direccion'))return'direccion';
  if(text.includes('laborsocial'))return'laborsocial';
  if(text.includes('clubdeportivo'))return'clubdeportivo';
  return text;
}

function callApi(action,params={}){
  return new Promise((resolve,reject)=>{
    const callbackName='callback_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const query=new URLSearchParams({...params,action,callback:callbackName}).toString();
    const script=document.createElement('script');

    window[callbackName]=response=>{
      delete window[callbackName];
      script.remove();
      resolve(response);
    };

    script.onerror=()=>{
      delete window[callbackName];
      script.remove();
      reject(new Error('No se pudo conectar con la base de datos.'));
    };

    script.src=SCRIPT_URL+'?'+query;
    document.body.appendChild(script);
  });
}

function showMessage(id,text,type){
  const element=document.getElementById(id);
  element.textContent=text;
  element.className='message '+type;
}

function clearMessage(id){
  const element=document.getElementById(id);
  element.textContent='';
  element.className='message';
}

function fillSelect(id,values,placeholder='Seleccione una opción'){
  const select=document.getElementById(id);
  select.innerHTML='';
  const first=document.createElement('option');
  first.value='';
  first.textContent=placeholder;
  select.appendChild(first);

  (values||[]).forEach(value=>{
    const option=document.createElement('option');
    option.value=value;
    option.textContent=value;
    select.appendChild(option);
  });
}

async function loadCatalogs(){
  try{
    const response=await callApi('getCatalogs');
    if(!response.success){showMessage('loginMessage',response.message,'error');return;}

    catalogs=response.catalogs||{};
    fillSelect('tipoSolicitud',catalogs.tiposSolicitud||['Copias','Resma de hojas']);
    fillSelect('etapaDestino',catalogs.etapasDestino||[]);
    fillSelect('objetoDestino',catalogs.destinos||[]);
    fillSelect('lado',catalogs.lado||['Una sola cara','Ambos lados']);
    fillSelect('corte',catalogs.corte||['No cortada','Cortada'],'Sin especificar');
    fillSelect('grapado',catalogs.grapado||['No grapada','Grapada'],'Sin especificar');
  }catch(error){
    showMessage('loginMessage',error.message,'error');
  }
}

async function searchUser(){
  clearMessage('loginMessage');
  const id=document.getElementById('userId').value.trim();
  const button=document.getElementById('loginButton');

  if(!id){showMessage('loginMessage','Debe ingresar un ID.','error');return;}

  button.disabled=true;
  button.textContent='Buscando...';

  try{
    const response=await callApi('getUser',{id});
    if(!response.success){showMessage('loginMessage',response.message,'error');return;}

    currentUser=response.user;
    document.getElementById('displayId').textContent=currentUser.id;
    document.getElementById('displayName').textContent=currentUser.nombre;
    document.getElementById('displayStage').textContent=currentUser.etapaUsuario||'Sin especificar';
    document.getElementById('displayRole').textContent=currentUser.rol||'Sin especificar';

    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('formCard').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(error){
    showMessage('loginMessage',error.message,'error');
  }finally{
    button.disabled=false;
    button.textContent='Ingresar';
  }
}

function updateRequestType(){
  const type=document.getElementById('tipoSolicitud').value;
  document.getElementById('copiesSection').classList.toggle('hidden',type!=='Copias');
  document.getElementById('reamSection').classList.toggle('hidden',type!=='Resma de hojas');
  updateDestinationStage();
  clearMessage('formMessage');
}

function updateDestinationStage(){
  const stage=document.getElementById('etapaDestino').value;
  const stageKey=normalizeStage(stage);
  const isAcademic=stageKey==='ebp'||stageKey==='emg';

  document.getElementById('academicFields').classList.toggle('hidden',!isAcademic);

  if(!isAcademic){
    fillSelect('grado',[]);
    fillSelect('seccion',[]);
    fillSelect('materia',[]);
    return;
  }

  let grades=(catalogs.gradosPorEtapa&&catalogs.gradosPorEtapa[stageKey])||[];
  const suggested=currentUser&&currentUser.gradosSugeridos?currentUser.gradosSugeridos:[];

  grades=[
    ...grades.filter(grade=>suggested.includes(grade)),
    ...grades.filter(grade=>!suggested.includes(grade))
  ];

  fillSelect('grado',grades);
  fillSelect('seccion',[]);
  fillSelect('materia',[]);
}

function updateGradeOptions(){
  const grade=document.getElementById('grado').value;

  if(!grade){
    fillSelect('seccion',[]);
    fillSelect('materia',[]);
    return;
  }

  const sections=(catalogs.seccionesPorGrado&&catalogs.seccionesPorGrado[grade])||[];
  const subjects=(catalogs.materiasPorGrado&&catalogs.materiasPorGrado[grade])||[];

  fillSelect('seccion',sections);
  fillSelect('materia',subjects);

  if(sections.length===1)document.getElementById('seccion').value=sections[0];
  if(subjects.length===1)document.getElementById('materia').value=subjects[0];
}

function updateTotal(){
  const originals=Number(document.getElementById('hojasOriginales').value||0);
  const sets=Number(document.getElementById('numeroJuegos').value||0);
  document.getElementById('totalCopias').textContent=originals*sets;
}

async function submitRequest(){
  clearMessage('formMessage');

  if(!currentUser){showMessage('formMessage','Debe ingresar con un ID válido.','error');return;}

  const type=document.getElementById('tipoSolicitud').value;
  const destinationStage=document.getElementById('etapaDestino').value;
  const destination=document.getElementById('objetoDestino').value;

  if(!type){showMessage('formMessage','Seleccione el tipo de solicitud.','error');return;}
  if(!destinationStage){showMessage('formMessage','Seleccione la etapa de destino.','error');return;}
  if(!destination){showMessage('formMessage','Seleccione el objeto o destino.','error');return;}

  const payload={
    id:currentUser.id,
    tipoSolicitud:type,
    etapaDestino:destinationStage,
    objetoDestino:destination,
    observaciones:document.getElementById('observaciones').value.trim(),
    comentario:document.getElementById('comentario').value.trim()
  };

  if(type==='Copias'){
    const stageKey=normalizeStage(destinationStage);
    const isAcademic=stageKey==='ebp'||stageKey==='emg';

    payload.grado=document.getElementById('grado').value;
    payload.seccion=document.getElementById('seccion').value;
    payload.materia=document.getElementById('materia').value;
    payload.hojasOriginales=document.getElementById('hojasOriginales').value;
    payload.numeroJuegos=document.getElementById('numeroJuegos').value;
    payload.lado=document.getElementById('lado').value;
    payload.corte=document.getElementById('corte').value;
    payload.grapado=document.getElementById('grapado').value;

    if(isAcademic&&(!payload.grado||!payload.seccion||!payload.materia)){
      showMessage('formMessage','Seleccione grado/año, sección y materia.','error');
      return;
    }

    if(!payload.hojasOriginales||!payload.numeroJuegos||!payload.lado){
      showMessage('formMessage','Complete hojas originales, número de juegos e impresión.','error');
      return;
    }
  }else{
    payload.cantidadResmas=document.getElementById('cantidadResmas').value;
    if(!payload.cantidadResmas){
      showMessage('formMessage','Ingrese la cantidad de resmas.','error');
      return;
    }
  }

  const button=document.getElementById('submitButton');
  button.disabled=true;
  button.textContent='Enviando...';

  try{
    const response=await callApi('submitRequest',payload);
    if(!response.success){showMessage('formMessage',response.message,'error');return;}

    let message=response.message;
    if(response.totalCopias)message+=' Total: '+response.totalCopias+' copias.';

    showMessage('formMessage',message,'success');
    resetFormFields();
  }catch(error){
    showMessage('formMessage',error.message,'error');
  }finally{
    button.disabled=false;
    button.textContent='Enviar solicitud';
  }
}

function resetFormFields(){
  document.getElementById('requestForm').reset();
  document.getElementById('copiesSection').classList.add('hidden');
  document.getElementById('reamSection').classList.add('hidden');
  document.getElementById('academicFields').classList.remove('hidden');
  document.getElementById('totalCopias').textContent='0';
  fillSelect('grado',[]);
  fillSelect('seccion',[]);
  fillSelect('materia',[]);
}

function resetApp(){
  currentUser=null;
  document.getElementById('userId').value='';
  resetFormFields();
  clearMessage('loginMessage');
  clearMessage('formMessage');
  document.getElementById('formCard').classList.add('hidden');
  document.getElementById('loginCard').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
