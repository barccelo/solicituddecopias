<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de copias</title>
  <style>
    :root{--red:#8b0000;--bg:#f3f4f6;--card:#fff;--border:#d8dce2;--text:#202124;--muted:#68707a}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
    header{background:var(--red);color:#fff;padding:18px 14px;text-align:center}
    header h1{margin:0;font-size:22px}
    main{max-width:860px;margin:0 auto;padding:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
    .hidden{display:none!important}
    label{font-weight:700;font-size:14px;margin-bottom:6px;display:block}
    input,select,textarea{width:100%;min-height:44px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:#fff}
    textarea{min-height:92px;resize:vertical}
    button{border:0;border-radius:10px;background:var(--red);color:#fff;font-weight:700;padding:11px 14px;cursor:pointer}
    button.secondary{background:#4b5563}
    button:disabled{opacity:.6;cursor:wait}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .grid-2{display:grid;grid-template-columns:1fr;gap:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .row label{font-weight:500;margin:0}
    .row input[type=checkbox]{width:auto;min-height:auto}
    .message{display:none;padding:11px;border-radius:10px;margin-top:12px}
    .message.ok{display:block;background:#e7f5ed;color:#166534}
    .message.err{display:block;background:#fdecef;color:#991b1b}
    .muted{color:var(--muted);font-size:13px}
    .total{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .total div{background:#f7f7f8;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
    .total strong{display:block;font-size:21px;color:var(--red)}
    @media(min-width:700px){.grid-2{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <h1>Solicitud de copias</h1>
</header>

<main>
  <section id="loginCard" class="card">
    <h2>Acceso</h2>
    <div class="grid-2">
      <div>
        <label>ID</label>
        <input id="loginId" inputmode="numeric">
      </div>
      <div>
        <label>PIN</label>
        <input id="loginPin" type="password" maxlength="6" inputmode="numeric">
      </div>
    </div>
    <button id="loginButton" style="margin-top:12px" onclick="login()">Ingresar</button>
    <div id="loginMessage" class="message"></div>
  </section>

  <section id="app" class="hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <strong id="userName"></strong>
          <div class="muted" id="userRole"></div>
        </div>
        <button class="secondary" onclick="logout()">Salir</button>
      </div>
    </div>

    <section class="card">
      <h2>Registrar solicitud</h2>

      <div class="grid-2">
        <div>
          <label>Tipo de solicitud</label>
          <select id="tipoSolicitud" onchange="refreshRequestType()">
            <option value="">Seleccione</option>
            <option>Copias</option>
            <option>Resma de hojas</option>
          </select>
        </div>
        <div>
          <label>Ámbito</label>
          <select id="ambito" onchange="refreshAmbito()"></select>
        </div>
      </div>

      <div class="grid-2" style="margin-top:12px">
        <div>
          <label>Objeto / Destino</label>
          <select id="objetoDestino" onchange="refreshObjectRule()"></select>
        </div>
        <div id="disciplineField" class="hidden">
          <label>Disciplina deportiva</label>
          <select id="disciplinaDeportiva"></select>
        </div>
      </div>

      <div id="academicFields" class="grid-2 hidden" style="margin-top:12px">
        <div>
          <label>Grado / Año</label>
          <select id="grado" onchange="refreshSectionsAndSubjects()"></select>
        </div>
        <div>
          <label>Sección</label>
          <select id="seccion"></select>
        </div>
        <div>
          <label>Materia</label>
          <select id="materia"></select>
        </div>
      </div>

      <div id="copyFields" class="grid-2 hidden" style="margin-top:12px">
        <div>
          <label>Hojas originales</label>
          <input id="hojasOriginales" type="number" min="1" oninput="calculateTotals()">
        </div>
        <div>
          <label>Número de juegos</label>
          <input id="numeroJuegos" type="number" min="1" oninput="calculateTotals()">
        </div>
      </div>

      <div id="reamFields" class="grid-2 hidden" style="margin-top:12px">
        <div>
          <label>Cantidad de resmas</label>
          <input id="cantidadResmas" type="number" min="1" oninput="calculateTotals()">
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <label><input id="dobleCara" type="checkbox" onchange="calculateTotals()"> Imprimir por ambos lados</label>
        <label><input id="grapado" type="checkbox"> Grapar</label>
        <label><input id="corte" type="checkbox"> Cortar</label>
      </div>

      <div class="total" style="margin-top:12px">
        <div>Total copias <strong id="totalCopias">0</strong></div>
        <div>Total hojas <strong id="totalHojas">0</strong></div>
      </div>

      <div class="grid-2" style="margin-top:12px">
        <div>
          <label>Fecha de entrega</label>
          <input id="fechaEntrega" type="date">
        </div>
        <div>
          <label>Hora de entrega</label>
          <input id="horaEntrega" type="time">
        </div>
      </div>

      <div style="margin-top:12px">
        <label>Comentario</label>
        <textarea id="comentario" placeholder="Opcional"></textarea>
      </div>

      <button id="submitButton" style="margin-top:12px" onclick="submitRequest()">Enviar solicitud</button>
      <div id="formMessage" class="message"></div>
    </section>
  </section>
</main>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw41nIIwyDbFgCOL-0-3HflQXGRFjCyVmUXDOWN3O-o-yCm724Aa1zyq3xaXtd21sg/exec';
let token='';
let currentUser=null;
let bootstrap=null;

function callApi(action, params={}){
  return new Promise((resolve,reject)=>{
    const callback='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const query=new URLSearchParams({...params,action,callback}).toString();
    const script=document.createElement('script');
    window[callback]=response=>{
      delete window[callback];
      script.remove();
      resolve(response);
    };
    script.onerror=()=>{
      delete window[callback];
      script.remove();
      reject(new Error('No se pudo conectar con la base de datos.'));
    };
    script.src=SCRIPT_URL+'?'+query;
    document.body.appendChild(script);
  });
}

function message(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='message '+type;
}

function fillSelect(id,values,placeholder='Seleccione'){
  const select=document.getElementById(id);
  select.innerHTML='';
  const first=document.createElement('option');
  first.value='';
  first.textContent=placeholder;
  select.appendChild(first);
  [...new Set((values||[]).filter(Boolean))].forEach(value=>{
    const option=document.createElement('option');
    option.value=value;
    option.textContent=value;
    select.appendChild(option);
  });
}

async function login(){
  const id=document.getElementById('loginId').value.trim();
  const pin=document.getElementById('loginPin').value.trim();
  const button=document.getElementById('loginButton');

  button.disabled=true;

  try{
    const response=await callApi('login',{id,pin});

    if(!response.success){
      message('loginMessage',response.message,'err');
      return;
    }

    token=response.token;
    currentUser=response.user;
    bootstrap=response.bootstrap;

    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('userName').textContent=currentUser.nombre;
    document.getElementById('userRole').textContent=currentUser.rol+' · ID '+currentUser.id;

    fillSelect('ambito',bootstrap.ambitos.map(item=>item.ambito));
    fillSelect('disciplinaDeportiva',bootstrap.disciplinas||[]);
    setToday();
    refreshRequestType();
    refreshAmbito();
  }catch(error){
    message('loginMessage',error.message,'err');
  }finally{
    button.disabled=false;
  }
}

async function logout(){
  if(token){
    await callApi('logout',{token});
  }
  location.reload();
}

function setToday(){
  const today=new Date();
  const yyyy=today.getFullYear();
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const dd=String(today.getDate()).padStart(2,'0');
  document.getElementById('fechaEntrega').value=`${yyyy}-${mm}-${dd}`;
}

function refreshRequestType(){
  const tipo=document.getElementById('tipoSolicitud').value;
  document.getElementById('copyFields').classList.toggle('hidden',tipo!=='Copias');
  document.getElementById('reamFields').classList.toggle('hidden',tipo!=='Resma de hojas');
  calculateTotals();
}

function refreshAmbito(){
  const ambito=document.getElementById('ambito').value;
  const objects=bootstrap.objetos
    .filter(item=>item.ambito===ambito)
    .map(item=>item.objeto);

  fillSelect('objetoDestino',objects);
  document.getElementById('disciplineField').classList.toggle('hidden',ambito!=='Club Deportivo');
  refreshObjectRule();
  refreshGrades();
}

function currentRule(){
  const ambito=document.getElementById('ambito').value;
  const objeto=document.getElementById('objetoDestino').value;
  return bootstrap.objetos.find(item=>item.ambito===ambito&&item.objeto===objeto);
}

function refreshObjectRule(){
  const rule=currentRule();
  const show=rule&&(rule.usaGrado||rule.usaSeccion||rule.usaMateria);
  document.getElementById('academicFields').classList.toggle('hidden',!show);
  refreshGrades();
}

function refreshGrades(){
  const ambito=document.getElementById('ambito').value;
  const grados=bootstrap.gradosSecciones
    .filter(item=>item.ambito===ambito)
    .map(item=>item.grado);

  fillSelect('grado',grados);
  refreshSectionsAndSubjects();
}

function refreshSectionsAndSubjects(){
  const ambito=document.getElementById('ambito').value;
  const grado=document.getElementById('grado').value;

  const secciones=bootstrap.gradosSecciones
    .filter(item=>item.ambito===ambito&&item.grado===grado)
    .map(item=>item.seccion);

  fillSelect('seccion',secciones);

  const materias=bootstrap.materias
    .filter(item=>item.ambito===ambito&&item.grado===grado)
    .map(item=>item.materia);

  fillSelect('materia',materias);
}

function calculateTotals(){
  const tipo=document.getElementById('tipoSolicitud').value;
  let totalCopias=0;
  let totalHojas=0;

  if(tipo==='Copias'){
    const hojas=Number(document.getElementById('hojasOriginales').value||0);
    const juegos=Number(document.getElementById('numeroJuegos').value||0);
    const doble=document.getElementById('dobleCara').checked;
    totalCopias=hojas*juegos;
    totalHojas=doble?Math.ceil(hojas/2)*juegos:totalCopias;
  }

  if(tipo==='Resma de hojas'){
    const resmas=Number(document.getElementById('cantidadResmas').value||0);
    totalCopias=0;
    totalHojas=resmas*500;
  }

  document.getElementById('totalCopias').textContent=totalCopias;
  document.getElementById('totalHojas').textContent=totalHojas;
}

async function submitRequest(){
  const button=document.getElementById('submitButton');
  const params={
    token,
    tipoSolicitud:document.getElementById('tipoSolicitud').value,
    ambito:document.getElementById('ambito').value,
    objetoDestino:document.getElementById('objetoDestino').value,
    grado:document.getElementById('grado').value,
    seccion:document.getElementById('seccion').value,
    materia:document.getElementById('materia').value,
    disciplinaDeportiva:document.getElementById('disciplinaDeportiva').value,
    hojasOriginales:document.getElementById('hojasOriginales').value,
    numeroJuegos:document.getElementById('numeroJuegos').value,
    cantidadResmas:document.getElementById('cantidadResmas').value,
    dobleCara:document.getElementById('dobleCara').checked,
    grapado:document.getElementById('grapado').checked,
    corte:document.getElementById('corte').checked,
    fechaEntrega:document.getElementById('fechaEntrega').value,
    horaEntrega:document.getElementById('horaEntrega').value,
    comentario:document.getElementById('comentario').value
  };

  button.disabled=true;

  try{
    const response=await callApi('submitRequest',params);

    if(!response.success){
      message('formMessage',response.message,'err');
      return;
    }

    message('formMessage',response.message+' ID: '+response.requestId,'ok');
    document.getElementById('hojasOriginales').value='';
    document.getElementById('numeroJuegos').value='';
    document.getElementById('cantidadResmas').value='';
    document.getElementById('comentario').value='';
    calculateTotals();
  }catch(error){
    message('formMessage',error.message,'err');
  }finally{
    button.disabled=false;
  }
}
</script>
</body>
</html>
