<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Solicitud de materiales</title>

  <style>
    :root {
      --primary:#8b0000;
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#202124;
      --muted:#676b72;
      --border:#dfe2e7;
      --success:#176b3a;
      --error:#a61b2b;
    }

    * {
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body {
      margin:0;
      min-height:100%;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app {
      min-height:100vh;
      padding-bottom:24px;
    }

    .header {
      background:var(--primary);
      color:white;
      padding:26px 18px 23px;
      text-align:center;
      border-radius:0 0 24px 24px;
    }

    .header h1 {
      margin:0;
      font-size:24px;
    }

    .header p {
      margin:8px 0 0;
      font-size:14px;
      opacity:.94;
    }

    .container {
      width:100%;
      max-width:760px;
      margin:0 auto;
      padding:16px 12px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      box-shadow:0 5px 18px rgba(0,0,0,.07);
      margin-bottom:16px;
    }

    .section-title {
      margin-bottom:17px;
      color:var(--primary);
      font-size:19px;
      font-weight:700;
    }

    .field {
      margin-bottom:16px;
    }

    label {
      display:block;
      margin-bottom:7px;
      font-size:15px;
      font-weight:700;
    }

    .optional {
      font-weight:400;
      color:var(--muted);
    }

    input, select, textarea {
      width:100%;
      min-height:52px;
      padding:13px 14px;
      border:1px solid var(--border);
      border-radius:12px;
      background:white;
      color:var(--text);
      font:inherit;
      font-size:16px;
    }

    textarea {
      min-height:96px;
      resize:vertical;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr;
      gap:0;
    }

    .button {
      width:100%;
      min-height:54px;
      border:0;
      border-radius:13px;
      padding:14px 16px;
      background:var(--primary);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .button.secondary {
      margin-top:10px;
      background:#44474d;
    }

    .button:disabled {
      background:#9a9a9a;
      cursor:wait;
    }

    .hidden {
      display:none !important;
    }

    .message {
      display:none;
      margin-top:14px;
      padding:13px;
      border-radius:11px;
      font-size:14px;
      line-height:1.4;
    }

    .message.success {
      display:block;
      background:#e9f6ee;
      color:var(--success);
      border:1px solid #b9dfc7;
    }

    .message.error {
      display:block;
      background:#fdecef;
      color:var(--error);
      border:1px solid #efb7c0;
    }

    .user-box {
      padding:14px;
      margin-bottom:17px;
      background:#f7f8fa;
      border:1px solid var(--border);
      border-radius:14px;
    }

    .user-row {
      padding:8px 0;
      border-bottom:1px solid #e4e6ea;
      font-size:14px;
    }

    .user-row:last-child {
      border-bottom:0;
    }

    .user-row strong {
      display:block;
      margin-bottom:3px;
      color:var(--muted);
    }

    .total-box {
      margin-bottom:17px;
      padding:15px;
      text-align:center;
      font-size:17px;
      font-weight:700;
      background:#fff6e6;
      border:1px solid #efd39a;
      border-radius:13px;
    }

    .total-box span {
      color:var(--primary);
      font-size:24px;
    }

    .check-list {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .check-option {
      display:flex;
      align-items:center;
      gap:8px;
      min-height:44px;
      padding:9px 11px;
      border:1px solid var(--border);
      border-radius:11px;
      background:#fff;
      font-weight:400;
      margin:0;
    }

    .check-option input {
      width:20px;
      height:20px;
      min-height:auto;
      padding:0;
      margin:0;
      flex:0 0 auto;
    }

    .check-option span {
      line-height:1.3;
    }

    .check-option.all-option {
      grid-column:1 / -1;
      background:#f7f8fa;
      font-weight:700;
    }

    .print-options {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .print-options .duplex-option {
      grid-column:1 / -1;
    }

    .totals-grid {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      align-items:stretch;
    }

    .total-item {
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:72px;
      padding:10px 8px;
    }

    .total-item span {
      display:block;
      margin-top:4px;
    }

    .search-select {
      position:relative;
    }

    .search-select-list {
      position:absolute;
      z-index:20;
      left:0;
      right:0;
      top:calc(100% + 6px);
      max-height:240px;
      overflow-y:auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .search-select-option {
      width:100%;
      padding:12px 14px;
      border:0;
      border-bottom:1px solid #eceef1;
      background:#fff;
      color:var(--text);
      text-align:left;
      font:inherit;
      cursor:pointer;
    }

    .search-select-option:last-child {
      border-bottom:0;
    }

    .search-select-option:active,
    .search-select-option:hover {
      background:#f5f6f8;
    }

    .search-select-empty {
      padding:12px 14px;
      color:var(--muted);
      font-size:14px;
    }

    @media(max-width:380px) {
      .check-list {
        grid-template-columns:1fr;
      }

      .totals-grid {
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:6px;
      }

      .total-item {
        min-height:66px;
        padding:8px 4px;
        font-size:14px;
      }

      .total-item span {
        font-size:22px;
      }
    }

    @media(min-width:760px) {
      .header {
        max-width:760px;
        margin:18px auto 0;
        border-radius:18px;
      }

      .grid {
        grid-template-columns:1fr 1fr;
        gap:14px;
      }
    }
  </style>
</head>

<body>
<div class="app">
  <header class="header">
    <h1>Solicitud de materiales</h1>
    <p>Copias y resmas de hojas</p>
  </header>

  <main class="container">
    <section id="loginCard" class="card">
      <div class="section-title">Ingreso</div>

      <div class="field">
        <label for="userId">ID del usuario</label>
        <input id="userId" type="text" inputmode="numeric" placeholder="Ejemplo: 1001">
      </div>

      <button id="loginButton" class="button" type="button" onclick="searchUser()">
        Ingresar
      </button>

      <div id="loginMessage" class="message"></div>
    </section>

    <section id="formCard" class="card hidden">
      <div class="section-title">Nueva solicitud</div>

      <div class="user-box">
        <div class="user-row"><strong>ID</strong><span id="displayId"></span></div>
        <div class="user-row"><strong>Nombre</strong><span id="displayName"></span></div>
        <div class="user-row"><strong>Cargo / Rol</strong><span id="displayRole"></span></div>
      </div>

      <form id="requestForm" onsubmit="return false;">
        <div class="field">
          <label for="tipoSolicitud">Tipo de solicitud</label>
          <select id="tipoSolicitud" onchange="updateRequestType()"></select>
        </div>

        <div class="field">
          <label for="etapaDestino">Etapa de destino</label>
          <select id="etapaDestino" onchange="updateStage()"></select>
        </div>

        <div class="field">
          <label for="objetoDestino">Objeto / Destino</label>
          <select id="objetoDestino" onchange="updateDestinationRule()"></select>
        </div>

        <div id="sportsField" class="field hidden">
          <label for="disciplinaDeportiva">Disciplina deportiva</label>
          <select id="disciplinaDeportiva">
            <option value="">Seleccione una disciplina</option>
            <option value="Ajedrez">Ajedrez</option>
            <option value="Atletismo">Atletismo</option>
            <option value="Astronomía">Astronomía</option>
            <option value="Baloncesto">Baloncesto</option>
            <option value="Béisbol">Béisbol</option>
            <option value="Fútbol Campo">Fútbol Campo</option>
            <option value="Fútbol Sala">Fútbol Sala</option>
            <option value="Música">Música</option>
            <option value="Robótica">Robótica</option>
            <option value="Tenis">Tenis</option>
          </select>
        </div>

        <div id="copiesSection" class="hidden">
          <div id="academicFields" class="hidden">
            <div id="gradeField" class="field hidden">
              <label>Grados / Años</label>
              <div id="gradeOptions" class="check-list"></div>
            </div>

            <div id="sectionField" class="field hidden">
              <label>Secciones</label>
              <div id="sectionOptions" class="check-list"></div>
            </div>

            <div id="subjectField" class="field hidden">
              <label for="materiaInput">Materia</label>

              <div class="search-select">
                <input
                  id="materiaInput"
                  type="search"
                  placeholder="Buscar o seleccionar materia"
                  autocomplete="off"
                  onfocus="openSubjectList()"
                  oninput="filterSubjectList()"
                >

                <input
                  id="materia"
                  type="hidden"
                >

                <div
                  id="materiaList"
                  class="search-select-list hidden"
                ></div>
              </div>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="hojasOriginales">Número de hojas originales</label>
              <input id="hojasOriginales" type="number" min="1" step="1" inputmode="numeric" oninput="updateTotal()">
            </div>

            <div class="field">
              <label for="numeroJuegos">Número de juegos</label>
              <input id="numeroJuegos" type="number" min="1" step="1" inputmode="numeric" oninput="updateTotal()">
            </div>
          </div>

          <div class="total-box totals-grid">
            <div class="total-item">
              <div>Total de copias</div>
              <span id="totalCopias">0</span>
            </div>

            <div class="total-item">
              <div>Total de hojas</div>
              <span id="totalHojasCopias">0</span>
            </div>
          </div>

          <div class="field">
            <label>Opciones de impresión</label>

            <div class="print-options">
              <label class="check-option duplex-option">
                <input id="ambosLados" type="checkbox" onchange="updateTotal()">
                <span>Imprimir por ambos lados</span>
              </label>

              <label class="check-option">
                <input id="grapar" type="checkbox">
                <span>Grapar</span>
              </label>

              <label class="check-option">
                <input id="cortar" type="checkbox">
                <span>Cortar</span>
              </label>
            </div>
          </div>
        </div>

        <div id="reamSection" class="hidden">
          <div class="field">
            <label for="cantidadResmas">Cantidad de resmas</label>
            <input id="cantidadResmas" type="number" min="1" step="1" inputmode="numeric" oninput="updateReamTotal()">
          </div>

          <div class="total-box">
            Total de hojas: <span id="totalHojas">0</span>
          </div>
        </div>

        <div class="field">
          <label for="fechaEntrega">Fecha de entrega</label>
          <input id="fechaEntrega" type="date">
        </div>

        <div class="grid">
          <div id="deliveryBlockField" class="field hidden">
            <label for="bloqueEntrega">Hora académica</label>
            <select id="bloqueEntrega" onchange="applySuggestedTime()">
              <option value="">Seleccione un bloque</option>
            </select>
          </div>

          <div class="field">
            <label for="horaEntrega">Hora de entrega</label>
            <input id="horaEntrega" type="time">
          </div>
        </div>

        <div class="field">
          <label for="comentario">Comentario <span class="optional">(opcional)</span></label>
          <textarea id="comentario"></textarea>
        </div>

        <button id="submitButton" class="button" type="button" onclick="submitRequest()">
          Enviar solicitud
        </button>

        <button class="button secondary" type="button" onclick="resetApp()">
          Cambiar de usuario
        </button>

        <div id="formMessage" class="message"></div>
      </form>
    </section>
  </main>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw41nIIwyDbFgCOL-0-3HflQXGRFjCyVmUXDOWN3O-o-yCm724Aa1zyq3xaXtd21sg/exec';

let currentUser=null;
let catalogs=null;
let currentSubjectOptions=[];

const DELIVERY_SCHEDULES={
  ebp:[
    {label:'1ra. — 07:15 a 08:00',time:'07:15'},
    {label:'2da. — 08:00 a 08:45',time:'08:00'},
    {label:'3ra. — 09:05 a 09:50',time:'09:05'},
    {label:'4ta. — 09:50 a 10:30',time:'09:50'},
    {label:'5ta. — 10:30 a 11:10',time:'10:30'},
    {label:'6ta. — 11:10 a 11:50',time:'11:10'},
    {label:'7ma. — 12:30 a 13:10',time:'12:30'},
    {label:'8va. — 13:10 a 13:50',time:'13:10'},
    {label:'9na. — 13:50 a 14:30',time:'13:50'}
  ],
  emg:[
    {label:'1ra. — 07:15 a 08:00',time:'07:15'},
    {label:'2da. — 08:00 a 08:45',time:'08:00'},
    {label:'3ra. — 08:45 a 09:30',time:'08:45'},
    {label:'4ta. — 10:00 a 10:40',time:'10:00'},
    {label:'5ta. — 10:40 a 11:20',time:'10:40'},
    {label:'6ta. — 11:20 a 12:00',time:'11:20'},
    {label:'7ma. — 12:00 a 12:40',time:'12:00'},
    {label:'8va. — 12:40 a 13:20',time:'12:40'},
    {label:'9na. — 13:45 a 14:30',time:'13:45'}
  ]
};

document.addEventListener('DOMContentLoaded',()=>{
  setDefaultDeliveryDate();
  loadCatalogs();

  document.getElementById('userId').addEventListener('keydown',event=>{
    if(event.key==='Enter'){
      event.preventDefault();
      searchUser();
    }
  });
});

function callApi(action,params={}){
  return new Promise((resolve,reject)=>{
    const callbackName='callback_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const query=new URLSearchParams({...params,action,callback:callbackName}).toString();
    const script=document.createElement('script');

    window[callbackName]=response=>{
      delete window[callbackName];
      script.remove();
      resolve(response);
    };

    script.onerror=()=>{
      delete window[callbackName];
      script.remove();
      reject(new Error('No se pudo conectar con la base de datos.'));
    };

    script.src=SCRIPT_URL+'?'+query;
    document.body.appendChild(script);
  });
}

function showMessage(id,text,type){
  const element=document.getElementById(id);
  element.textContent=text;
  element.className='message '+type;
}

function clearMessage(id){
  const element=document.getElementById(id);
  element.textContent='';
  element.className='message';
}

function fillSelect(id,values,placeholder='Seleccione una opción'){
  const select=document.getElementById(id);
  select.innerHTML='';

  const first=document.createElement('option');
  first.value='';
  first.textContent=placeholder;
  select.appendChild(first);

  (values||[]).forEach(value=>{
    const option=document.createElement('option');
    option.value=value;
    option.textContent=value;
    select.appendChild(option);
  });
}

function normalizeText(value){
  return String(value||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .trim()
    .toLowerCase();
}

function normalizeStage(value){
  const text=String(value||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,'')
    .toLowerCase();

  if(text.includes('ebp'))return'ebp';
  if(text.includes('emg'))return'emg';
  return text;
}

function setDefaultDeliveryDate(){
  const dateInput=document.getElementById('fechaEntrega');
  if(!dateInput)return;
  const today=new Date();
  const localDate=new Date(today.getTime()-today.getTimezoneOffset()*60000)
    .toISOString().split('T')[0];
  dateInput.value=localDate;
  dateInput.min=localDate;
}

function updateDeliverySchedule(){
  const stage=document.getElementById('etapaDestino').value;
  const stageKey=normalizeStage(stage);
  const field=document.getElementById('deliveryBlockField');
  const select=document.getElementById('bloqueEntrega');
  const schedule=DELIVERY_SCHEDULES[stageKey]||[];

  select.innerHTML='<option value="">Seleccione un bloque</option>';
  schedule.forEach(item=>{
    const option=document.createElement('option');
    option.value=item.label;
    option.dataset.time=item.time;
    option.textContent=item.label;
    select.appendChild(option);
  });

  field.classList.toggle('hidden',schedule.length===0);
  if(!schedule.length)select.value='';
}

function applySuggestedTime(){
  const select=document.getElementById('bloqueEntrega');
  const option=select.options[select.selectedIndex];
  if(option&&option.dataset.time){
    document.getElementById('horaEntrega').value=option.dataset.time;
  }
}

async function loadCatalogs(){
  try{
    const response=await callApi('getCatalogs');

    if(!response.success){
      showMessage('loginMessage',response.message,'error');
      return;
    }

    catalogs=response.catalogs||{};

    fillSelect(
      'tipoSolicitud',
      catalogs.tiposSolicitud||['Copias','Resma de hojas']
    );
  }catch(error){
    showMessage('loginMessage',error.message,'error');
  }
}

async function searchUser(){
  clearMessage('loginMessage');

  const id=document.getElementById('userId').value.trim();
  const button=document.getElementById('loginButton');

  if(!id){
    showMessage('loginMessage','Debe ingresar un ID.','error');
    return;
  }

  button.disabled=true;
  button.textContent='Buscando...';

  try{
    const response=await callApi('getUser',{id});

    if(!response.success){
      showMessage('loginMessage',response.message,'error');
      return;
    }

    currentUser=response.user;

    document.getElementById('displayId').textContent=currentUser.id;
    document.getElementById('displayName').textContent=currentUser.nombre;
    document.getElementById('displayRole').textContent=currentUser.rol||'Sin especificar';

    fillSelect('etapaDestino',currentUser.etapas||[]);
    fillSelect('objetoDestino',[]);

    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('formCard').classList.remove('hidden');

    window.scrollTo({top:0,behavior:'smooth'});
  }catch(error){
    showMessage('loginMessage',error.message,'error');
  }finally{
    button.disabled=false;
    button.textContent='Ingresar';
  }
}

function getCurrentRule(){
  const stage=document.getElementById('etapaDestino').value;
  const destination=document.getElementById('objetoDestino').value;

  return (catalogs.reglasDestino||[]).find(rule=>
    normalizeText(rule.etapa)===normalizeText(stage) &&
    normalizeText(rule.destino)===normalizeText(destination)
  )||null;
}

function updateRequestType(){
  const type=document.getElementById('tipoSolicitud').value;

  document
    .getElementById('copiesSection')
    .classList.toggle('hidden',type!=='Copias');

  document
    .getElementById('reamSection')
    .classList.toggle('hidden',type!=='Resma de hojas');

  updateDestinationRule();
}

function updateSportsField(){
  const stage=
    document.getElementById('etapaDestino').value;

  const show=
    normalizeStage(stage)==='clubdeportivo';

  document
    .getElementById('sportsField')
    .classList.toggle('hidden',!show);

  if(!show){
    document.getElementById('disciplinaDeportiva').value='';
  }
}

function updateStage(){
  const stage=document.getElementById('etapaDestino').value;

  updateSportsField();
  updateDeliverySchedule();

  const permittedDestinations=(currentUser.destinos||[]).filter(destination=>
    (catalogs.reglasDestino||[]).some(rule=>
      normalizeText(rule.etapa)===normalizeText(stage) &&
      normalizeText(rule.destino)===normalizeText(destination)
    )
  );

  fillSelect('objetoDestino',permittedDestinations);
  clearAcademicSelections();
}

function updateDestinationRule(){
  const type=document.getElementById('tipoSolicitud').value;
  const rule=getCurrentRule();

  const showAcademic=
    type==='Copias' &&
    currentUser &&
    currentUser.usaCamposAcademicos &&
    rule &&
    (rule.usaGrado||rule.usaSeccion||rule.usaMateria);

  document
    .getElementById('academicFields')
    .classList.toggle('hidden',!showAcademic);

  if(!showAcademic){
    clearAcademicSelections();
    return;
  }

  document
    .getElementById('gradeField')
    .classList.toggle('hidden',!rule.usaGrado);

  document
    .getElementById('sectionField')
    .classList.toggle('hidden',!rule.usaSeccion);

  document
    .getElementById('subjectField')
    .classList.toggle('hidden',!rule.usaMateria);

  renderGradeOptions(currentUser.grados||[]);
  renderSectionOptions([]);
  currentSubjectOptions=[];
  resetSubjectControl();
}

function renderCheckboxGroup(containerId,values,allLabel,onChange){
  const container=document.getElementById(containerId);
  container.innerHTML='';

  if(!values.length)return;

  const allWrapper=document.createElement('label');
  allWrapper.className='check-option all-option';

  const allInput=document.createElement('input');
  allInput.type='checkbox';
  allInput.dataset.role='all';

  const allText=document.createElement('span');
  allText.textContent=allLabel;

  allInput.addEventListener('change',()=>{
    container
      .querySelectorAll('input[data-role="item"]')
      .forEach(input=>{
        input.checked=allInput.checked;
      });

    onChange();
  });

  allWrapper.appendChild(allInput);
  allWrapper.appendChild(allText);
  container.appendChild(allWrapper);

  values.forEach(value=>{
    const wrapper=document.createElement('label');
    wrapper.className='check-option';

    const input=document.createElement('input');
    input.type='checkbox';
    input.value=value;
    input.dataset.role='item';

    const text=document.createElement('span');
    text.textContent=value;

    input.addEventListener('change',()=>{
      const items=[
        ...container.querySelectorAll('input[data-role="item"]')
      ];

      allInput.checked=
        items.length>0 &&
        items.every(item=>item.checked);

      onChange();
    });

    wrapper.appendChild(input);
    wrapper.appendChild(text);
    container.appendChild(wrapper);
  });
}

function selectedCheckboxValues(containerId){
  return [
    ...document.querySelectorAll(
      '#'+containerId+' input[data-role="item"]:checked'
    )
  ].map(input=>input.value);
}

function renderGradeOptions(values){
  renderCheckboxGroup(
    'gradeOptions',
    values,
    'Todos los grados / años',
    onGradesChanged
  );
}

function renderSectionOptions(values){
  renderCheckboxGroup(
    'sectionOptions',
    values,
    'Todas las secciones',
    ()=>{}
  );
}

function onGradesChanged(){
  const selectedGrades=
    selectedCheckboxValues('gradeOptions');

  if(!selectedGrades.length){
    renderSectionOptions([]);
    currentSubjectOptions=[];
    resetSubjectControl();
    return;
  }

  const sections=[
    ...new Set(
      selectedGrades.flatMap(grade=>
        (
          catalogs.seccionesPorGrado &&
          catalogs.seccionesPorGrado[grade]
        ) || []
      )
    )
  ];

  currentSubjectOptions=
    (currentUser.materias||[]).filter(subject=>
      selectedGrades.every(grade=>
        (
          (
            catalogs.materiasPorGrado &&
            catalogs.materiasPorGrado[grade]
          ) || []
        ).includes(subject)
      )
    );

  renderSectionOptions(sections);
  resetSubjectControl();
}

function resetSubjectControl(){
  document.getElementById('materiaInput').value='';
  document.getElementById('materia').value='';
  document
    .getElementById('materiaList')
    .classList.add('hidden');
  renderSubjectList(currentSubjectOptions);
}

function openSubjectList(){
  renderSubjectList(currentSubjectOptions);
  document
    .getElementById('materiaList')
    .classList.remove('hidden');
}

function filterSubjectList(){
  const query=normalizeText(
    document.getElementById('materiaInput').value
  );

  const filtered=currentSubjectOptions.filter(subject=>
    normalizeText(subject).includes(query)
  );

  document.getElementById('materia').value='';
  renderSubjectList(filtered);
  document
    .getElementById('materiaList')
    .classList.remove('hidden');
}

function renderSubjectList(values){
  const list=document.getElementById('materiaList');
  list.innerHTML='';

  if(!values.length){
    const empty=document.createElement('div');
    empty.className='search-select-empty';
    empty.textContent='No hay materias coincidentes';
    list.appendChild(empty);
    return;
  }

  values.forEach(subject=>{
    const option=document.createElement('button');
    option.type='button';
    option.className='search-select-option';
    option.textContent=subject;

    option.addEventListener('click',()=>{
      document.getElementById('materiaInput').value=subject;
      document.getElementById('materia').value=subject;
      list.classList.add('hidden');
    });

    list.appendChild(option);
  });
}

document.addEventListener('click',event=>{
  const control=event.target.closest('.search-select');

  if(!control){
    const list=document.getElementById('materiaList');

    if(list){
      list.classList.add('hidden');
    }
  }
});
function clearAcademicSelections(){
  document.getElementById('academicFields').classList.add('hidden');
  document.getElementById('gradeField').classList.add('hidden');
  document.getElementById('sectionField').classList.add('hidden');
  document.getElementById('subjectField').classList.add('hidden');

  document.getElementById('gradeOptions').innerHTML='';
  document.getElementById('sectionOptions').innerHTML='';
  currentSubjectOptions=[];
  resetSubjectControl();
}

function updateTotal(){
  const originals=
    Number(document.getElementById('hojasOriginales').value||0);

  const games=
    Number(document.getElementById('numeroJuegos').value||0);

  const bothSides=
    document.getElementById('ambosLados').checked;

  const totalCopies=
    originals*games;

  const totalSheets=
    bothSides
      ? Math.ceil(originals/2)*games
      : totalCopies;

  document.getElementById('totalCopias').textContent=
    totalCopies.toLocaleString('es-VE');

  document.getElementById('totalHojasCopias').textContent=
    totalSheets.toLocaleString('es-VE');
}
function updateReamTotal(){
  const reams=
    Number(document.getElementById('cantidadResmas').value||0);

  document.getElementById('totalHojas').textContent=
    (reams*500).toLocaleString('es-VE');
}

async function submitRequest(){
  clearMessage('formMessage');

  if(!currentUser){
    showMessage(
      'formMessage',
      'Debe ingresar con un ID válido.',
      'error'
    );
    return;
  }

  const type=document.getElementById('tipoSolicitud').value;
  const stage=document.getElementById('etapaDestino').value;
  const destination=document.getElementById('objetoDestino').value;

  if(!type||!stage||!destination){
    showMessage(
      'formMessage',
      'Seleccione tipo, etapa y destino.',
      'error'
    );
    return;
  }

  const deliveryDate=document.getElementById('fechaEntrega').value;
  const deliveryTime=document.getElementById('horaEntrega').value;

  if(!deliveryDate){
    showMessage('formMessage','Seleccione la fecha de entrega.','error');
    return;
  }

  if(!deliveryTime){
    showMessage('formMessage','Seleccione la hora de entrega.','error');
    return;
  }

  const payload={
    id:currentUser.id,
    tipoSolicitud:type,
    etapaDestino:stage,
    objetoDestino:destination,
    fechaEntrega:
      document.getElementById('fechaEntrega').value,
    horaEntrega:
      document.getElementById('horaEntrega').value,
    bloqueEntrega:
      document.getElementById('bloqueEntrega').value,
    disciplinaDeportiva:
      document.getElementById('disciplinaDeportiva').value,
    comentario:
      document.getElementById('comentario').value.trim()
  };

  if(type==='Copias'){
    const rule=getCurrentRule();

    const needsAcademic=
      currentUser.usaCamposAcademicos &&
      rule &&
      (rule.usaGrado||rule.usaSeccion||rule.usaMateria);

    if(needsAcademic){
      const selectedGrades=
        selectedCheckboxValues('gradeOptions');

      const selectedSections=
        selectedCheckboxValues('sectionOptions');

      payload.grados=selectedGrades.join(',');
      payload.secciones=selectedSections.join(',');
      payload.materia=
        document.getElementById('materia').value;

      if(rule.usaGrado&&!selectedGrades.length){
        showMessage(
          'formMessage',
          'Seleccione al menos un grado o año.',
          'error'
        );
        return;
      }

      if(rule.usaSeccion&&!selectedSections.length){
        showMessage(
          'formMessage',
          'Seleccione al menos una sección.',
          'error'
        );
        return;
      }

      if(rule.usaMateria&&!payload.materia){
        showMessage(
          'formMessage',
          'Seleccione una materia.',
          'error'
        );
        return;
      }
    }

    payload.hojasOriginales=
      document.getElementById('hojasOriginales').value;

    payload.numeroJuegos=
      document.getElementById('numeroJuegos').value;

    payload.ambosLados=
      document.getElementById('ambosLados').checked;

    payload.grapar=
      document.getElementById('grapar').checked;

    payload.cortar=
      document.getElementById('cortar').checked;

    if(!payload.hojasOriginales||!payload.numeroJuegos){
      showMessage(
        'formMessage',
        'Complete hojas originales y número de juegos.',
        'error'
      );
      return;
    }
  }else{
    payload.cantidadResmas=
      document.getElementById('cantidadResmas').value;

    if(!payload.cantidadResmas){
      showMessage(
        'formMessage',
        'Ingrese la cantidad de resmas.',
        'error'
      );
      return;
    }
  }

  const button=document.getElementById('submitButton');
  button.disabled=true;
  button.textContent='Enviando...';

  try{
    const response=
      await callApi('submitRequest',payload);

    if(!response.success){
      showMessage(
        'formMessage',
        response.message,
        'error'
      );
      return;
    }

    let message=response.message;

    if(response.totalCopias){
      message+=
        ' Total: '+response.totalCopias+' copias.';
    }

    showMessage(
      'formMessage',
      message,
      'success'
    );

    resetFormFields();
  }catch(error){
    showMessage(
      'formMessage',
      error.message,
      'error'
    );
  }finally{
    button.disabled=false;
    button.textContent='Enviar solicitud';
  }
}

function resetFormFields(){
  document.getElementById('requestForm').reset();

  document
    .getElementById('copiesSection')
    .classList.add('hidden');

  document
    .getElementById('reamSection')
    .classList.add('hidden');

  document.getElementById('totalCopias').textContent='0';
  document.getElementById('totalHojasCopias').textContent='0';
  document.getElementById('totalHojas').textContent='0';
  document.getElementById('horaEntrega').value='';
  document.getElementById('disciplinaDeportiva').value='';
  document.getElementById('sportsField').classList.add('hidden');
  document.getElementById('bloqueEntrega').innerHTML='<option value="">Seleccione un bloque</option>';
  document.getElementById('deliveryBlockField').classList.add('hidden');

  setDefaultDeliveryDate();
  clearAcademicSelections();
}

function resetApp(){
  currentUser=null;

  document.getElementById('userId').value='';

  resetFormFields();
  clearMessage('loginMessage');
  clearMessage('formMessage');

  document
    .getElementById('formCard')
    .classList.add('hidden');

  document
    .getElementById('loginCard')
    .classList.remove('hidden');

  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
